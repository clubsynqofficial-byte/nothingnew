<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate of Achievement</title>
</head>
<body style="margin:0;padding:0;background-color:#e8e0d5;font-family:Georgia,'Times New Roman',serif;">

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e8e0d5;padding:40px 0;">
    <tr>
      <td align="center" valign="top">

        <!-- Certificate card -->
        <table width="700" cellpadding="0" cellspacing="0" border="0"
          style="background-color:#fffef9;border:2px solid #8a1538;">
          <tr>
            <td>

              <!-- Inner gold border -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0"
                style="border:1px solid #c9a84c;margin:6px;width:calc(100% - 12px);">
                <tr>
                  <td style="padding:44px 60px 40px 60px;">

                    <!-- ── Club name ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:14px;">
                          <span style="font-family:Arial,Helvetica,sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;color:#8a1538;text-transform:uppercase;">
                            {{club_name}}
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Top divider ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:14px;">
                      <tr>
                        <td width="140" style="border-top:1px solid #c9a84c;opacity:0.5;">&nbsp;</td>

                        <td style="border-top:1px solid #c9a84c;opacity:0.5;">&nbsp;</td>
                      </tr>
                    </table>

                    <!-- ── "presents this" ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:6px;">
                          <span style="font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:15px;color:#7a6a58;letter-spacing:1px;">
                            presents this
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Certificate of Achievement ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:24px;">
                          <span style="font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:700;color:#1a0a0e;letter-spacing:2px;display:block;line-height:1.15;">
                            Certificate of Achievement
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── "This is to certify that" ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:10px;">
                          <span style="font-family:Arial,Helvetica,sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;color:#9b8a75;text-transform:uppercase;">
                            This is to certify that
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Recipient name ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:8px;">
                          <span style="font-family:Georgia,'Times New Roman',serif;font-size:52px;font-style:italic;font-weight:700;color:#8a1538;letter-spacing:1px;display:block;line-height:1.1;">
                            {{recipient_name}}
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Name underline ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:18px;">
                      <tr>
                        <td>&nbsp;</td>
                        <td width="320" style="border-top:1px solid #c9a84c;">&nbsp;</td>
                        <td>&nbsp;</td>
                      </tr>
                    </table>

                    <!-- ── "has successfully participated in" ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:6px;">
                          <span style="font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:15px;color:#7a6a58;letter-spacing:1px;">
                            has successfully participated in
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Event name ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-bottom:18px;">
                          <span style="font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:700;color:#1a0a0e;letter-spacing:1px;display:block;">
                            {{event_name}}
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Achievement text ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding:0 40px 24px 40px;">
                          <span style="font-family:Georgia,'Times New Roman',serif;font-size:14px;color:#5c4a3a;line-height:1.9;font-style:italic;display:block;text-align:center;">
                            {{achievement}}
                          </span>
                        </td>
                      </tr>
                    </table>

                    <!-- ── Bottom divider ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                      <tr>
                        <td width="140" style="border-top:1px solid #c9a84c;opacity:0.5;">&nbsp;</td>

                        <td style="border-top:1px solid #c9a84c;opacity:0.5;">&nbsp;</td>
                      </tr>
                    </table>

                    <!-- ── Footer: 3 columns ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr valign="bottom">

                        <!-- Issued By -->
                        <td width="33%" align="center" style="padding:0 10px;">
                          <table cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                              <td align="center" style="padding-bottom:6px;">
                                <span style="font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:700;color:#1a0a0e;display:block;">
                                  {{issued_by}}
                                </span>
                              </td>
                            </tr>
                            <tr>
                              <td style="border-top:1px solid #8a1538;opacity:0.3;">&nbsp;</td>
                            </tr>
                            <tr>
                              <td align="center" style="padding-top:5px;">
                                <span style="font-family:Arial,Helvetica,sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;color:#9b8a75;text-transform:uppercase;">
                                  Issued By
                                </span>
                              </td>
                            </tr>
                          </table>
                        </td>

                        <!-- Seal (center) -->
                        <td width="34%" align="center" style="padding:0 10px;">
                          <table cellpadding="0" cellspacing="0" border="0" align="center">
                            <tr>
                              <td align="center">
                                <!-- SVG seal -->
                                <table cellpadding="0" cellspacing="0" border="0"
                                  style="width:90px;height:90px;border-radius:50%;border:1px solid #8a1538;background-color:#fdf9f0;"
                                  width="90" height="90">
                                  <tr>
                                    <td align="center" valign="middle" style="padding:10px;">
                                      <span style="display:block;font-family:Arial,Helvetica,sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;color:#8a1538;text-transform:uppercase;padding-bottom:2px;">CERTIFIED</span>
                                      <span style="display:block;font-size:22px;color:#c9a84c;line-height:1;">&#10022;</span>
                                      <span style="display:block;font-family:Arial,Helvetica,sans-serif;font-size:6px;font-weight:700;letter-spacing:2px;color:#8a1538;text-transform:uppercase;padding-top:2px;">CLUBSYNQ</span>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                          </table>
                        </td>

                        <!-- Issue date -->
                        <td width="33%" align="center" style="padding:0 10px;">
                          <table cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                              <td align="center" style="padding-bottom:6px;">
                                <span style="font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:700;color:#1a0a0e;display:block;">
                                  {{issue_date}}
                                </span>
                              </td>
                            </tr>
                            <tr>
                              <td style="border-top:1px solid #8a1538;opacity:0.3;">&nbsp;</td>
                            </tr>
                            <tr>
                              <td align="center" style="padding-top:5px;">
                                <span style="font-family:Arial,Helvetica,sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;color:#9b8a75;text-transform:uppercase;">
                                  Date of Issue
                                </span>
                              </td>
                            </tr>
                          </table>
                        </td>

                      </tr>
                    </table>

                    <!-- ── Event date footnote ── -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-top:20px;">
                          <span style="font-family:Arial,Helvetica,sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:#9b8a75;text-transform:uppercase;">
                            Event held on &nbsp; {{event_date}}
                          </span>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
              <!-- /inner gold border -->

            </td>
          </tr>
        </table>
        <!-- /certificate card -->

      </td>
    </tr>
  </table>

</body>
</html>
